<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    text-decoration:none;
    font-family:'Poppins', sans-serif;
}
body{
    background:linear-gradient(-45deg,#eef2ff,#ffffff,#e0e7ff,#f5f3ff);
    background-size:400% 400%;
    animation:bgMove 8s ease infinite;
}
@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}
header{
    display:flex;
    justify-content:flex-end;
    padding:15px 40px;
    position:fixed;
    top:0;
    width:100%;
    backdrop-filter:blur(10px);
    background:rgba(255,255,255,0.7);
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
    z-index:1000;
}

nav{
    display:flex;
    gap:30px;
}

nav a{
    color:#333;
    font-weight:500;
    font-size:18px;
}

nav a:hover{
    color:#4f46e5;
}
.main{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding-top:100px;
}
section{
    display:flex;
    align-items:center;
    justify-content:space-between;
    width:90%;
    max-width:1100px;
    gap:60px;
}

.geek img{
    width:clamp(260px, 30vw, 380px);
    border-radius:20px;
    mix-blend-mode:multiply;
    transition:0.4s;
    animation:zoomIn 1.2s ease;
}

.geek img:hover{
    transform:scale(1.05);
}

@keyframes zoomIn{
    from{
        opacity:0;
        transform:scale(0.8);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

.container2{
    max-width:550px;
}

.container2 h1,
.container2 h2,
.container2 p{
    opacity:0;
    transform:translateY(30px);
    animation:slideUp 0.8s forwards;
}

.container2 h1{ animation-delay:0.3s; }
.container2 h2{ animation-delay:0.6s; }
.container2 p{ animation-delay:0.9s; }

@keyframes slideUp{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.container2 h1{
    font-size:clamp(40px,5vw,60px);
    font-family:'Dancing Script', cursive;
    background:linear-gradient(to right,#4f46e5,#9333ea);
    -webkit-background-clip:text;
    color:transparent;
}

.container2 h2{
    font-size:clamp(22px,2.5vw,28px);
    margin-top:10px;
    color:#444;
}
.container2 p{
    margin-top:18px;
    font-size:clamp(16px,1.3vw,18px);
    color:#555;
    line-height:1.7;
}
.btn{
    margin-top:25px;
}

.btn1{
    background:linear-gradient(45deg,#4f46e5,#9333ea);
    color:white;
    padding:12px 30px;
    border:none;
    border-radius:25px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

.btn1:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}
@media(max-width:900px){
    section{
        flex-direction:column;
        text-align:center;
    }
}

@media(max-width:500px){
    header{
        justify-content:center;
    }

    nav{
        gap:15px;
    }
}

</style>
</head>

<body>

<header>
<nav>
<a href="./index.html">Home</a>
<a href="./about.html">About</a>
<a href="./Project.html">Project</a>
<a href="./contact.html">Contact</a>
</nav>
</header>

<div class="main">

<section>

<div class="geek">
<img src="./images/christy2.png" alt="Profile">
</div>

<div class="container2">
<h1>Hi, I'm Christy Benny</h1>
<h2>Junior Python Developer</h2>

<p>
I build modern and responsive web applications using Python,
Django, HTML, and CSS. Passionate about turning ideas into real digital solutions.
</p>

<div class="btn">
<a href="./project.html">
<button class="btn1">View Projects</button>
</a>
</div>

</div>

</section>

</div>

</body>
</html>
